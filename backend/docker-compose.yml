services:
  postgres:
    image: postgres:18
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: karan
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - ecommerce_pg_data:/var/lib/postgresql/data

volumes:
  ecommerce_pg_data: